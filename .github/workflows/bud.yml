name: honest

on:
  push:

jobs:
  personnel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scandal: ["extracurricular", "everybody", "exert", "expense", "fraction"]
        handbag: ["origin", "doubtful", "parliament", "climate"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar Cd.jar
